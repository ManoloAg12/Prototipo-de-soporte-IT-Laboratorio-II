<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal de Autoservicio UMA</title>
    
    <link rel="icon" href="assets/img/logo-uma.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md border-t-4 border-red-700">
        
        <div class="text-center mb-8 flex flex-col items-center">
            <img src="assets/img/logosuperiorsantaana3.png" alt="Logo UMA" class="h-16 w-auto object-contain mb-4">
            <h1 class="text-2xl font-bold text-gray-800">Portal de Autoservicio</h1>
            <p class="text-gray-500 text-sm mt-2">Gestión de Tecnologías de Información</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Usuario</label>
                <input type="text" id="username" required 
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-red-700 focus:border-red-700 transition">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                <div class="relative mt-1">
                    <input type="password" id="password" required 
                        class="block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-red-700 focus:border-red-700 transition pr-12">
                    
                    <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-red-700 focus:outline-none transition">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.29 3.29m0 0a10.05 10.05 0 015.188-1.55c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0l-3.29-3.29" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="errorMessage" class="hidden text-red-600 text-sm font-medium text-center bg-red-50 py-2 rounded">
                Usuario o contraseña incorrectos.
            </div>

            <button type="submit" 
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-bold text-white bg-red-700 hover:bg-red-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-700 transition duration-150 transform hover:scale-[1.02]">
                Ingresar
            </button>
        </form>
    </div>

    <script src="js/auth.js"></script>
    
    <script>
        const togglePassword = document.getElementById('togglePassword');
        const password = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', function () {
            // Alternar el tipo de input entre 'password' y 'text'
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            // Cambiar el estilo del ícono para dar feedback visual de que está activo
            if (type === 'text') {
                eyeIcon.classList.remove('text-gray-400');
                eyeIcon.classList.add('text-red-700');
            } else {
                eyeIcon.classList.remove('text-red-700');
                eyeIcon.classList.add('text-gray-400');
            }
        });
    </script>
</body>
</html>
